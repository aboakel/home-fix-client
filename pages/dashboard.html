<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Fixer | Dashboard</title>
  <link rel="stylesheet" href="../style/style.css" />
</head>
<body>
  <main class="phone-frame app-phone dashboard-phone">
    <header class="home-header">
      <div>
        <h1 class="brand small-brand">Dashboard</h1>
        <p>Backend CRUD control</p>
      </div>
      <a class="filter-btn" href="home.html">⌂</a>
    </header>

    <section class="dashboard-tools">
      <input id="filterCity" placeholder="City" />
      <select id="filterStatus">
        <option value="">All status</option>
        <option value="open">Open</option>
        <option value="in_progress">In progress</option>
        <option value="completed">Completed</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <select id="filterService">
        <option value="">All services</option>
        <option value="plumbing">Plumbing</option>
        <option value="electric">Electric</option>
        <option value="cleaning">Cleaning</option>
        <option value="maintenance">Maintenance</option>
        <option value="painting">Painting</option>
        <option value="carpentry">Carpentry</option>
      </select>
      <button id="filterBtn" class="btn btn-soft">Filter</button>
      <button id="resetBtn" class="btn btn-soft">Reset</button>
    </section>

    <section id="statsGrid" class="stats-grid"></section>
    <div id="dashboardMessage" class="inline-message hidden"></div>
    <section id="requestsList" class="request-list"></section>

    <nav class="bottom-nav figma-nav">
      <a href="../index.html" title="Profile">●</a>
      <a href="home.html" title="Home">⌂</a>
      <a href="messages.html" title="Messages">▣</a>
      <a class="active" href="dashboard.html" title="Cart">▦</a>
    </nav>
  </main>

  <script src="../js/api.js"></script>
  <script src="../js/dashboard.js"></script>
</body>
</html>
