<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Fixer | Attach</title>
  <link rel="stylesheet" href="../style/style.css" />
</head>
<body>
  <main class="phone-frame app-phone white-screen chat-screen">
    <header class="top-icons">
      <a href="chat.html" class="icon-link">‹</a>
    </header>

    <section id="attachHeader" class="chat-logo-area"></section>

    <section class="chat-thread attach-thread">
      <div class="bubble provider">Hi Ameer,<br />How can I help you?</div>
    </section>

    <section class="attach-panel">
      <div class="grabber"></div>
      <div class="photos-row">
        <button class="camera-tile">▣</button>
        <div class="photo-tile photo-one"><b></b></div>
        <div class="photo-tile photo-two"><b></b></div>
        <a href="#">All Photos</a>
      </div>
      <hr />
      <button>⌕ Attach File</button>
      <button>⌖ Send Location</button>
      <button>⚠ Emergency Request</button>
      <button>♧ Contact Support</button>
    </section>

    <form class="chat-input">
      <a href="chat.html" class="plus-chat">+</a>
      <input placeholder="How can I help you?" />
      <button type="button">⌄</button>
    </form>
  </main>

  <script src="../js/providers.js"></script>
  <script>
    renderAttachHeader();
  </script>
</body>
</html>
