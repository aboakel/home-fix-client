<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Fixer | Create Request</title>
  <link rel="stylesheet" href="../style/style.css" />
</head>
<body>
  <main class="phone-frame app-phone white-screen request-screen">
    <header class="top-icons">
      <a href="home.html" class="icon-link">‹</a>
      <a href="dashboard.html" class="icon-link">☷</a>
    </header>

    <section class="request-card">
      <h1 class="brand small-brand center">HomeFixer</h1>
      <h2>Create Repair Request</h2>
      <p class="muted">This form is connected to the backend and MongoDB.</p>

      <form id="requestForm" class="stack-form">
        <input id="customerName" placeholder="Customer name" required />
        <input id="phone" placeholder="Phone" required />
        <input id="city" placeholder="City" required />
        <input id="address" placeholder="Address" required />
        <select id="serviceType" required>
          <option value="">Service type</option>
          <option value="plumbing">Plumbing</option>
          <option value="electric">Electric</option>
          <option value="cleaning">Cleaning</option>
          <option value="maintenance">Maintenance</option>
          <option value="painting">Painting</option>
          <option value="carpentry">Carpentry</option>
        </select>
        <textarea id="description" placeholder="Describe the problem" required></textarea>
        <select id="priority">
          <option value="normal">Normal</option>
          <option value="high">High</option>
          <option value="urgent">Urgent</option>
        </select>
        <input id="estimatedPrice" type="number" placeholder="Estimated price ₪" value="220" />
        <button type="button" id="weatherBtn" class="btn btn-soft">Check Weather</button>
        <div id="weatherBox" class="inline-message hidden"></div>
        <button type="submit" class="btn blue-wide">Submit Request</button>
        <div id="requestMessage" class="inline-message hidden"></div>
      </form>
    </section>

    <nav class="bottom-nav figma-nav">
      <a href="../index.html" title="Profile">●</a>
      <a href="home.html" title="Home">⌂</a>
      <a href="messages.html" title="Messages">▣</a>
      <a href="dashboard.html" title="Cart">▦</a>
    </nav>
  </main>

  <script src="../js/api.js"></script>
  <script src="../js/create-request.js"></script>
</body>
</html>
