<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Fixer | Sign In</title>
  <link rel="stylesheet" href="style/style.css" />
</head>
<body class="auth-bg">
  <main class="phone-frame auth-phone">
    <div class="ios-status">
      <span>9:41</span>
      <span>▮▮▮  Wi‑Fi  ▰</span>
    </div>

    <section class="signin-card">
      <h1 class="brand brand-dark">Home Fixer</h1>

      <div class="signin-content">
        <h2>Create an account</h2>
        <p>Enter your email to sign up for this app</p>

        <form id="registerForm" class="stack-form">
          <input id="registerName" type="text" placeholder="Full name" value="Ameer" />
          <input id="registerEmail" type="email" placeholder="email@domain.com" />
          <input id="registerPassword" type="password" placeholder="Password" value="123456" />
          <button type="submit" class="btn btn-black">Continue</button>
        </form>

        <div id="authMessage" class="inline-message hidden"></div>

        <div class="divider"><span></span><b>or</b><span></span></div>

        <a class="social-btn" href="pages/home.html"><span class="google-g">G</span> Continue with Google</a>
        <a class="social-btn" href="pages/home.html"><span class="apple-logo">●</span> Continue with Apple</a>

        <p class="terms">
          By clicking continue, you agree to our
          <strong>Terms of Service</strong><br />
          and <strong>Privacy Policy</strong>
        </p>
      </div>
    </section>

    <div class="ios-homebar"></div>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
